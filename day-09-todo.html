<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Day 9 - Todo List</title>
  <style>
    body { font-family: Arial, sans-serif; max-width: 500px; margin: 40px auto; padding: 0 20px; }
    h1 { color: #333; }
    .input-row { display: flex; gap: 10px; margin-bottom: 20px; }
    input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 16px; }
    button { padding: 10px 20px; background: #4CAF50; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; }
    button:hover { background: #45a049; }
    .todo-item { display: flex; justify-content: space-between; align-items: center; background: #f9f9f9; padding: 12px 16px; margin: 8px 0; border-radius: 6px; }
    .todo-item span { font-size: 15px; }
    .delete-btn { background: #e74c3c; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; }
    .done { text-decoration: line-through; color: #999; }
  </style>
</head>
<body>
  <h1>✅ My Todo List</h1>
  <div class="input-row">
    <input type="text" id="todo-input" placeholder="Add a new task..."/>
    <button onclick="addTodo()">Add</button>
  </div>
  <div id="todo-list"></div>

  <script src="day-09-todo.js"></script>
</body>
</html>
